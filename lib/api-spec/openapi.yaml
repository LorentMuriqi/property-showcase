openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Real Estate & Virtual Tours API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Real estate project operations
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      description: Returns paginated list of projects with optional filters
      parameters:
        - name: country
          in: query
          schema:
            type: string
          description: Filter by country
        - name: city
          in: query
          schema:
            type: string
          description: Filter by city
        - name: search
          in: query
          schema:
            type: string
          description: Search by title or description
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
        - name: recent
          in: query
          schema:
            type: boolean
          description: Return only the most recent projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects:
    post:
      operationId: createProject
      tags: [admin]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/{id}:
    put:
      operationId: updateProject
      tags: [admin]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [admin]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /locations/countries:
    get:
      operationId: listCountries
      tags: [projects]
      summary: List all countries that have projects
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /locations/cities:
    get:
      operationId: listCities
      tags: [projects]
      summary: List cities, optionally filtered by country
      parameters:
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of cities
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ProjectImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        caption:
          type: string
          nullable: true
        isPrimary:
          type: boolean
      required:
        - id
        - url
        - isPrimary

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImage"
        customFields:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - country
        - city
        - status
        - images
        - createdAt
        - updatedAt

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - projects
        - total
        - page
        - limit
        - totalPages

    ProjectImageInput:
      type: object
      properties:
        url:
          type: string
        caption:
          type: string
          nullable: true
        isPrimary:
          type: boolean
      required:
        - url
        - isPrimary

    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImageInput"
        customFields:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - title
        - country
        - city
        - status

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImageInput"
        customFields:
          type: object
          nullable: true
          additionalProperties: true
