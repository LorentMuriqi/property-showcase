openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Real Estate & Virtual Tours API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Real estate project operations
  - name: admin
    description: Admin operations
  - name: virtual-tour
    description: Virtual tour 360° operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: Listo të gjitha projektet
      parameters:
        - name: country
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
        - name: recent
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Lista e projekteve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Merr një projekt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detajet e projektit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Nuk u gjet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/virtual-tour:
    get:
      operationId: getVirtualTour
      tags: [virtual-tour]
      summary: Merr të dhënat e virtual tour për një projekt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skenat dhe hotspot-et e virtual tour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualTourData"
        "404":
          description: Nuk u gjet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects:
    post:
      operationId: createProject
      tags: [admin]
      summary: Krijo projekt të ri
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Projekti i krijuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          description: Gabim validimi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/{id}:
    put:
      operationId: updateProject
      tags: [admin]
      summary: Përditëso projekt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Projekti i përditësuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Nuk u gjet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [admin]
      summary: Fshi projekt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fshirë
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Nuk u gjet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/projects/{id}/virtual-tour/scenes:
    post:
      operationId: createVirtualTourScene
      tags: [admin]
      summary: Shto skenë 360° në virtual tour
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSceneRequest"
      responses:
        "201":
          description: Skena e krijuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualTourScene"

  /admin/virtual-tour/scenes/{id}:
    put:
      operationId: updateVirtualTourScene
      tags: [admin]
      summary: Përditëso skenë
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSceneRequest"
      responses:
        "200":
          description: Skena e përditësuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualTourScene"
    delete:
      operationId: deleteVirtualTourScene
      tags: [admin]
      summary: Fshi skenë
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fshirë
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/virtual-tour/scenes/{id}/hotspots:
    post:
      operationId: createHotspot
      tags: [admin]
      summary: Shto hotspot lidhëse mes skenave
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHotspotRequest"
      responses:
        "201":
          description: Hotspot-i i krijuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualTourHotspot"

  /admin/virtual-tour/hotspots/{id}:
    put:
      operationId: updateHotspot
      tags: [admin]
      summary: Përditëso hotspot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHotspotRequest"
      responses:
        "200":
          description: Hotspot-i i përditësuar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VirtualTourHotspot"
    delete:
      operationId: deleteHotspot
      tags: [admin]
      summary: Fshi hotspot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fshirë
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /locations/countries:
    get:
      operationId: listCountries
      tags: [projects]
      summary: Listo shtetet
      responses:
        "200":
          description: Lista e shteteve
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /locations/cities:
    get:
      operationId: listCities
      tags: [projects]
      summary: Listo qytetet
      parameters:
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista e qyteteve
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ProjectImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        caption:
          type: string
          nullable: true
        isPrimary:
          type: boolean
      required:
        - id
        - url
        - isPrimary

    VirtualTourHotspot:
      type: object
      properties:
        id:
          type: integer
        fromSceneId:
          type: integer
        toSceneId:
          type: integer
        yaw:
          type: number
        pitch:
          type: number
        label:
          type: string
          nullable: true
      required:
        - id
        - fromSceneId
        - toSceneId
        - yaw
        - pitch

    VirtualTourScene:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        positionX:
          type: number
          nullable: true
        positionY:
          type: number
          nullable: true
        pitchCorrection:
          type: number
          nullable: true
        yawCorrection:
          type: number
          nullable: true
        hotspots:
          type: array
          items:
            $ref: "#/components/schemas/VirtualTourHotspot"
      required:
        - id
        - projectId
        - title
        - imageUrl
        - isDefault
        - sortOrder
        - hotspots

    VirtualTourData:
      type: object
      properties:
        projectId:
          type: integer
        scenes:
          type: array
          items:
            $ref: "#/components/schemas/VirtualTourScene"
        defaultSceneId:
          type: integer
          nullable: true
      required:
        - projectId
        - scenes

    Project:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        contactCompany:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImage"
        hasCustomVirtualTour:
          type: boolean
        customFields:
          type: object
          nullable: true
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - country
        - city
        - status
        - images
        - hasCustomVirtualTour
        - createdAt
        - updatedAt

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - projects
        - total
        - page
        - limit
        - totalPages

    ProjectImageInput:
      type: object
      properties:
        url:
          type: string
        caption:
          type: string
          nullable: true
        isPrimary:
          type: boolean
      required:
        - url
        - isPrimary

    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        contactCompany:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImageInput"
        customFields:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - title
        - country
        - city
        - status

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        country:
          type: string
        city:
          type: string
        address:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        areaM2:
          type: number
          nullable: true
        bedrooms:
          type: integer
          nullable: true
        bathrooms:
          type: integer
          nullable: true
        livingRooms:
          type: integer
          nullable: true
        floors:
          type: integer
          nullable: true
        yearBuilt:
          type: integer
          nullable: true
        propertyType:
          type: string
          nullable: true
        status:
          type: string
          enum: [for_sale, sold, rented, for_rent]
        virtualTourUrl:
          type: string
          nullable: true
        virtualTourEmbedCode:
          type: string
          nullable: true
        virtualTourProvider:
          type: string
          nullable: true
        contactCompany:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProjectImageInput"
        customFields:
          type: object
          nullable: true
          additionalProperties: true

    CreateSceneRequest:
      type: object
      properties:
        title:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        positionX:
          type: number
          nullable: true
        positionY:
          type: number
          nullable: true
        pitchCorrection:
          type: number
          nullable: true
        yawCorrection:
          type: number
          nullable: true
      required:
        - title
        - imageUrl

    UpdateSceneRequest:
      type: object
      properties:
        title:
          type: string
        imageUrl:
          type: string
        thumbnailUrl:
          type: string
          nullable: true
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        positionX:
          type: number
          nullable: true
        positionY:
          type: number
          nullable: true
        pitchCorrection:
          type: number
          nullable: true
        yawCorrection:
          type: number
          nullable: true

    CreateHotspotRequest:
      type: object
      properties:
        toSceneId:
          type: integer
        yaw:
          type: number
        pitch:
          type: number
        label:
          type: string
          nullable: true
      required:
        - toSceneId
        - yaw
        - pitch

    UpdateHotspotRequest:
      type: object
      properties:
        toSceneId:
          type: integer
        yaw:
          type: number
        pitch:
          type: number
        label:
          type: string
          nullable: true
